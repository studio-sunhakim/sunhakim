
<!DOCTYPE html><html><head><meta charSet="utf-8" data-next-head=""/><meta name="viewport" content="width=device-width, initial-scale=1" data-next-head=""/><link rel="preload" href="/fonts/main.otf" as="font" type="font/otf" crossorigin="anonymous" data-next-head=""/><link rel="preload" href="/fonts/serif.otf" as="font" type="font/otf" crossorigin="anonymous" data-next-head=""/><link rel="preload" href="/fonts/logo.otf" as="font" type="font/otf" crossorigin="anonymous" data-next-head=""/><link rel="icon" href="/favicon.ico" data-next-head=""/><link rel="apple-touch-icon" href="/apple-touch-icon.png" data-next-head=""/><title data-next-head="">Hanwell</title><link rel="preload" href="/logo.svg?dpl=dpl_7W8zJmuj87kdSaZDc5uD3wGj4rV6" as="image" data-next-head=""/><link rel="preload" href="/_next/static/chunks/426da4b698c6556d.css?dpl=dpl_7W8zJmuj87kdSaZDc5uD3wGj4rV6" as="style"/><style data-next-head="">
    .hw-root {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
    }

    .hw-shell {
      width: 100%;
      padding: 0 12px;
    }

    /* ===========================
       PAGE HEADER
    =========================== */

    .hw-main {
      padding-top: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hw-page-header {
      text-align: center;
      margin-bottom: 60px;
      max-width: 400px;
      padding: 0 12px;
    }

    .hw-page-header h1 {
      margin: 0;
      font-family: "Hanwell Main", sans-serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.2;
      color: #171717;
    }


    .hw-get-in-touch {
      margin-top: 16px;
      font-family: "Hanwell Main", sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #1f1f1f;
      background: rgba(38, 38, 38, 0.08);
      border: none;
      border-radius: 2px;
      padding: 6px 8px 4px 8px;
      cursor: pointer;
      transition: background 300ms cubic-bezier(0.22, 0.61, 0.36, 1);
      display: inline-block;
    }

    .hw-get-in-touch:hover {
      background: rgba(38, 38, 38, 0.16);
    }


    /* ===========================
       IMAGE STACK
    =========================== */

    .hw-gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 200px;
      width: 100%;
    }

    .hw-gallery-item {
      overflow: hidden;
      background: #e8e4df;
      flex-shrink: 0;
    }

    .hw-gallery-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===========================
       FOOTER
    =========================== */

    .hw-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 60px;
      padding-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hw-footer-link {
      position: relative;
      display: inline-block;
      font-family: "Hanwell Main", sans-serif;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: 0em;
      color: #1f1f1f;
    }

    .hw-footer-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 100%;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .hw-footer-link:hover::after { transform: scaleX(1); transform-origin: left center; }
    .hw-footer-link:not(:hover)::after { transform-origin: right center; }

    /* ===========================
       CONTACT OVERLAY
    =========================== */

    .hw-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 24px;
      opacity: 0;
      animation: hw-overlay-in 1200ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hw-overlay--closing { animation: hw-overlay-out 1200ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    .hw-modal {
      width: 100%;
      max-width: 450px;
      border-radius: 40px;
      background: #ffffff;
      padding: 48px;
      text-align: left;
      position: relative;
      opacity: 0;
      transform: translateY(40px) scale(0.98);
      animation: hw-modal-in 1200ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hw-modal--closing { animation: hw-modal-out 1200ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    .hw-contact-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; }
    .hw-contact-head-left { display: flex; align-items: flex-start; gap: 16px; }
    .hw-contact-copy { display: flex; flex-direction: column; gap: 2px; padding-top: 2px; }

    .hw-contact-kicker {
      margin: 0;
      font-family: "Hanwell Serif", Georgia, serif;
      font-size: 18px;
      line-height: 1.1;
      color: #1f1f1f;
      letter-spacing: -0.03em;
    }

    .hw-contact-title {
      margin: 0;
      font-family: "Hanwell Main", sans-serif;
      font-size: 18px;
      font-weight: 650;
      line-height: 1.1;
      color: #1f1f1f;
      letter-spacing: -0.03em;
    }

    .hw-contact-close {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: none;
      background: #e8e8e8;
      color: #1f1f1f;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      line-height: 1;
      padding: 0;
    }

    .hw-contact-options { margin-top: 36px; display: flex; flex-direction: column; gap: 14px; }

    .hw-contact-option {
      width: 100%;
      border: none;
      border-radius: 999px;
      background: #efefef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 8px 12px 8px 28px;
      cursor: pointer;
      transition: background 220ms cubic-bezier(0.22, 0.61, 0.36, 1), color 220ms cubic-bezier(0.22, 0.61, 0.36, 1);
      text-decoration: none;
    }

    .hw-contact-option:hover { background: rgba(101, 98, 89, 0.8); color: #ffffff; }
    .hw-contact-option:hover .hw-contact-option-text { color: #ffffff; }

    .hw-contact-option-text {
      font-family: "Hanwell Main", sans-serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #1f1f1f;
    }

    .hw-contact-option-iconWrap {
      width: 50px;
      height: 50px;
      border-radius: 999px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .hw-contact-option-icon { width: 22px; height: 22px; display: block; color: #1f1f1f; flex: 0 0 auto; }

    @keyframes hw-overlay-in  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes hw-overlay-out { from { opacity: 1; } to { opacity: 0; } }
    @keyframes hw-modal-in    { from { opacity: 0; transform: translateY(40px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes hw-modal-out   { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(18px) scale(0.985); } }

    /* ===========================
       RESPONSIVE — mobile (≤768px)
    =========================== */

    @media (max-width: 768px) {
      .hw-main { padding-top: 200px; }
      .hw-page-header { margin-bottom: 28px; }
      .hw-page-header h1 { font-size: 20px; }
      .hw-gallery { gap: 12px; }
      .hw-gallery-item {
        width: calc(100vw - 24px) !important;
        height: auto !important;
      }
      .hw-gallery-item img {
        height: auto;
      }
      .hw-modal { max-width: calc(100vw - 32px); padding: 36px; border-radius: 24px; }
      .hw-contact-kicker, .hw-contact-title { font-size: 15px; }
      .hw-contact-option { min-height: 68px; padding: 8px 10px 8px 20px; }
      .hw-contact-option-text { font-size: 15px; }
      .hw-contact-option-iconWrap { width: 46px; height: 46px; }
      .hw-footer-link { font-size: 13px; }
    }
