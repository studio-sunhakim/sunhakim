<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KIM SUNHA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #222222;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .header {
      width: 100%;
      height: 106px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    .header-inner {
      width: 100%;
      max-width: 1284px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 48px;
      letter-spacing: -1px;
      font-weight: 400;
      white-space: nowrap;
      color: #222222;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .nav a {
      font-size: 20px;
      letter-spacing: 1px;
      font-weight: 400;
      color: #848484;
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: #005210;
    }

    .main {
      width: 100%;
      min-height: calc(100vh - 106px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .visual {
      width: 100%;
      height: calc(100vh - 106px);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 2.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .slide img {
      max-width: 100%;
      max-height: 78vh;
      object-fit: contain;
      display: block;
    }

    .caption {
      position: absolute;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      z-index: 5;
      width: 90%;
      text-align: center;
      font-size: 16px;
      line-height: 1.5;
      color: #000000;
    }

    .mobile-menu-button {
      display: none;
      width: 32px;
      height: 28px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .mobile-menu-button span {
      display: block;
      width: 22px;
      height: 1px;
      background: #222222;
      margin: 7px auto;
    }

    .mobile-nav {
      display: none;
      background: #ffffff;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .mobile-nav a {
      display: block;
      padding: 13px 20px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: 700;
      color: rgba(26, 30, 36, 0.7);
    }

    .mobile-nav.open {
      display: block;
    }

    @media (max-width: 991px) {
      .header {
        height: 56px;
      }

      .header-inner {
        padding: 0 20px;
      }

      .logo {
        font-size: 22px;
        letter-spacing: 0;
      }

      .nav {
        display: none;
      }

      .mobile-menu-button {
        display: block;
      }

      .main,
      .visual {
        min-height: calc(100vh - 56px);
        height: calc(100vh - 56px);
      }

      .slide {
        padding: 20px;
      }

      .slide img {
        max-height: 70vh;
      }

      .caption {
        bottom: 22px;
        font-size: 11px;
      }
    }
.site-footer {
  width: 100%;
  padding: 18px 14px 16px;
  background: #ffffff;
  text-align: center;
  color: #222222;
}

.site-footer p {
  margin: 0;
  font-size: 10px;
  line-height: 1.6;
  font-weight: 400;
  letter-spacing: -0.1px;
  color: #111111;
  word-break: keep-all;
}
      
  </style>
</head>

<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">K I M&nbsp;&nbsp;S U N H A</a>

      <nav class="nav">
        <a href="about.html">ABOUT</a>
        <a href="studio.html">STUDIO</a>
        <a href="archive.html">ARCHIVE</a>
        <a href="exhibitions.html">EXHIBITIONS</a>
        <a href="contact.html">CONTACT</a>
      </nav>

      <button class="mobile-menu-button" id="mobileMenuButton" aria-label="menu">
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="about.html">ABOUT</a>
    <a href="studio.html">STUDIO</a>
    <a href="archive.html">ARCHIVE</a>
    <a href="exhibitions.html">EXHIBITIONS</a>
    <a href="contact.html">CONTACT</a>
  </nav>

  <main class="main">
    <section class="visual">
      <div class="slide active" data-caption="Towards, 2017, Color on Fabric, 160.0 x 130.0cm">
        <img src="https://cdn.imweb.me/thumbnail/20241229/dc53efce15304.jpg" alt="Main artwork 01">
      </div>

      <div class="slide" data-caption="Towards, 2017, Color on Fabric, 112.0 x 81.0cm">
        <img src="https://cdn.imweb.me/thumbnail/20241229/41b3c253d3b51.jpg" alt="Main artwork 02">
      </div>

      <div class="slide" data-caption="Towards, 2022, Color on canvas, 130 x 162cm">
        <img src="https://cdn.imweb.me/thumbnail/20241229/86d242b05aa47.jpg" alt="Main artwork 03">
      </div>

      <div class="slide" data-caption="Untitled, 2002, Color on Korean Paper, 130.0 × 162.0cm">
        <img src="https://cdn.imweb.me/thumbnail/20241229/cd023e67b90a7.jpg" alt="Main artwork 04">
      </div>

      <p class="caption" id="caption">
        Towards, 2017, Color on Fabric, 160.0 x 130.0cm
      </p>
    </section>
  </main>
    
<footer class="site-footer">
  <p class="copyright">
    ALL IMAGES AND CONTENTS © KIM SUNHA — ALL RIGHTS RESERVED
  </p>

  <p class="company-info">
    상호명: 스튜디오 김선하&nbsp;&nbsp;
    대표: 김선하&nbsp;&nbsp;
    대표자 이메일: sunn_h@naver.com
  </p>
</footer>
    
  <script>
    const slides = document.querySelectorAll(".slide");
    const caption = document.getElementById("caption");
    let current = 0;

    function showSlide(index) {
      slides.forEach(slide => slide.classList.remove("active"));
      slides[index].classList.add("active");
      caption.textContent = slides[index].dataset.caption;
    }

    setInterval(() => {
      current = (current + 1) % slides.length;
      showSlide(current);
    }, 7000);

    const mobileMenuButton = document.getElementById("mobileMenuButton");
    const mobileNav = document.getElementById("mobileNav");

    mobileMenuButton.addEventListener("click", () => {
      mobileNav.classList.toggle("open");
    });
  </script>
</body>
</html>
